version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: wired_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wired_db
      POSTGRES_USER: wired_user
      POSTGRES_PASSWORD: wired_pass
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
